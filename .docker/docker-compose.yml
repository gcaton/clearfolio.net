services:
  api:
    build:
      context: ../src/api
      dockerfile: Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - DB_PATH=/data/clearfolio.db
    volumes:
      - clearfolio-data:/data

  app:
    build:
      context: ../src/app
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - api

volumes:
  clearfolio-data:
