name: Build and Push

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      calver: ${{ steps.calver.outputs.version }}
    steps:
      - id: calver
        run: echo "version=$(date -u +'%Y.%m.%d').${{ github.run_number }}" >> "$GITHUB_OUTPUT"

  build:
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/clearfolio
      VERSION: ${{ needs.version.outputs.calver }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        run: |
          out="src/app/public/changelog.json"
          feats=$(git log --pretty=format:'{"hash":"%h","date":"%cs","message":"%s"}' --grep="^feat[:(]" --no-merges)
          fixes=$(git log --pretty=format:'{"hash":"%h","date":"%cs","message":"%s"}' --grep="^fix[:(]" --no-merges)
          echo '{' > "$out"
          echo '  "features": [' >> "$out"
          first=true
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            $first && first=false || echo "," >> "$out"
            printf "    %s" "$line" >> "$out"
          done <<< "$feats"
          echo "" >> "$out"
          echo '  ],' >> "$out"
          echo '  "fixes": [' >> "$out"
          first=true
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            $first && first=false || echo "," >> "$out"
            printf "    %s" "$line" >> "$out"
          done <<< "$fixes"
          echo "" >> "$out"
          echo '  ]' >> "$out"
          echo "}" >> "$out"

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            APP_VERSION=${{ env.VERSION }}
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ env.VERSION }}
          cache-from: |
            type=gha,scope=linux-amd64
            type=gha,scope=linux-arm64
          cache-to: |
            type=gha,mode=max,scope=linux-amd64
            type=gha,mode=max,scope=linux-arm64

      - uses: actions/delete-package-versions@v5
        with:
          package-name: clearfolio
          package-type: container
          min-versions-to-keep: 5
          delete-only-untagged-versions: false
