name: Build and Push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: src/app/package-lock.json

      - name: Run .NET tests
        run: dotnet test src/api/Clearfolio.Tests --verbosity normal

      - name: Build Angular
        run: |
          cd src/app
          npm ci
          npx ng build --configuration production

  publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/clearfolio
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set version
        run: echo "VERSION=$(date -u +'%Y.%m.%d').${{ github.run_number }}" >> "$GITHUB_ENV"

      - name: Generate changelog
        run: |
          out="src/app/public/changelog.json"
          feats=$(git log --pretty=format:'%h%x09%cs%x09%s' --grep="^feat[:(]" --no-merges \
            | jq -R -s 'split("\n")[:-1] | map(select(length > 0) | split("\t") | {hash: .[0], date: .[1], message: .[2]})')
          fixes=$(git log --pretty=format:'%h%x09%cs%x09%s' --grep="^fix[:(]" --no-merges \
            | jq -R -s 'split("\n")[:-1] | map(select(length > 0) | split("\t") | {hash: .[0], date: .[1], message: .[2]})')
          jq -n --argjson feats "$feats" --argjson fixes "$fixes" '{features: $feats, fixes: $fixes}' > "$out"

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            APP_VERSION=${{ env.VERSION }}
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ env.VERSION }}
          cache-from: |
            type=gha,scope=linux-amd64
            type=gha,scope=linux-arm64
          cache-to: |
            type=gha,mode=max,scope=linux-amd64
            type=gha,mode=max,scope=linux-arm64

      - uses: actions/delete-package-versions@v5
        with:
          package-name: clearfolio
          package-type: container
          min-versions-to-keep: 5
          delete-only-untagged-versions: false
