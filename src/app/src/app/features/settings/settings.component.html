<h1>Settings</h1>

<p-toast />

<p-tabs value="0">
  <p-tablist>
    <p-tab value="0">Household</p-tab>
    <p-tab value="1">Members</p-tab>
    <p-tab value="2">Goals</p-tab>
  </p-tablist>
  <p-tabpanels>
    <p-tabpanel value="0">
      @if (household(); as h) {
        <div class="settings-form">
          <label for="name">Household Name</label>
          <input pInputText id="name" [(ngModel)]="h.name" />

          <label for="currency">Base Currency</label>
          <input pInputText id="currency" [(ngModel)]="h.baseCurrency" />

          <label for="period">Preferred Period Type</label>
          <p-select
            id="period"
            [(ngModel)]="h.preferredPeriodType"
            [options]="periodOptions"
            optionLabel="label"
            optionValue="value"
          />

          <p-button label="Save" icon="pi pi-check" (onClick)="saveHousehold()" />
        </div>
      }
    </p-tabpanel>
    <p-tabpanel value="1">
      <div class="members-header">
        <p-button label="Add Member" icon="pi pi-user-plus" (onClick)="openAddMember()" />
      </div>
      <div class="members-list">
        @for (member of members(); track member.id) {
          <div class="member-card">
            <div class="member-info">
              <p-tag [value]="member.memberTag" severity="info" />
              @if (editingMemberId() === member.id) {
                <input pInputText [(ngModel)]="editingEmail" class="email-input" />
              } @else {
                <span class="member-email">{{ member.email }}</span>
              }
              @if (member.isPrimary) {
                <p-tag value="Primary" severity="success" />
              }
            </div>
            <div class="member-name-row">
              @if (editingMemberId() === member.id) {
                <input pInputText [(ngModel)]="editingName" class="name-input" />
                <p-button icon="pi pi-check" [rounded]="true" [text]="true" severity="success" (onClick)="saveMember(member)" />
                <p-button icon="pi pi-times" [rounded]="true" [text]="true" severity="secondary" (onClick)="cancelEditMember()" />
              } @else {
                <span class="display-name">{{ member.displayName }}</span>
                <p-button icon="pi pi-pencil" [rounded]="true" [text]="true" severity="info" (onClick)="startEditMember(member)" />
              }
            </div>
          </div>
        }
      </div>
    </p-tabpanel>
    <p-tabpanel value="2">
      <div class="settings-form">
        <label for="nwTarget">Net Worth Target</label>
        <p-inputnumber id="nwTarget" [(ngModel)]="netWorthTarget"
          mode="currency" currency="AUD" locale="en-AU" />

        <label for="superTarget">Super Target</label>
        <p-inputnumber id="superTarget" [(ngModel)]="superTarget"
          mode="currency" currency="AUD" locale="en-AU" />

        <p-button label="Save Goals" icon="pi pi-check" (onClick)="saveGoals()" />
      </div>
    </p-tabpanel>
  </p-tabpanels>
</p-tabs>

<p-dialog header="Add Member" [(visible)]="addMemberVisible" [modal]="true" [style]="{ width: '400px' }">
  <div class="form-grid">
    <label for="newEmail">Email</label>
    <input pInputText id="newEmail" [(ngModel)]="newMemberEmail" placeholder="partner@gmail.com" />

    <label for="newName">Display Name</label>
    <input pInputText id="newName" [(ngModel)]="newMemberName" placeholder="e.g. Sarah" />
  </div>

  <ng-template #footer>
    <p-button label="Cancel" [text]="true" (onClick)="addMemberVisible.set(false)" />
    <p-button label="Add" icon="pi pi-check" (onClick)="addMember()" [disabled]="!newMemberEmail || !newMemberName" />
  </ng-template>
</p-dialog>
