<div class="login-page">
  <div class="login-card" [class.shaking]="shaking()" (animationend)="shaking.set(false)">
    <img src="logo.svg" alt="" class="login-logo" />
    <h1>Welcome back</h1>
    <p class="login-subtitle">Enter your passphrase to continue.</p>

    <div class="login-form">
      <label for="passphrase">Passphrase</label>
      <p-password
        id="passphrase"
        [(ngModel)]="passphrase"
        [feedback]="false"
        [toggleMask]="true"
        [autofocus]="true"
        (keydown.enter)="submit()"
        styleClass="w-full"
        [inputStyleClass]="'w-full'"
        placeholder="Enter passphrase" />

      @if (error()) {
        <small class="login-error" role="alert">{{ error() }}</small>
      }

      <p-button
        label="Unlock"
        icon="pi pi-lock-open"
        iconPos="right"
        (onClick)="submit()"
        [disabled]="!passphrase() || submitting()"
        [loading]="submitting()"
        styleClass="login-btn" />
    </div>
  </div>
</div>
