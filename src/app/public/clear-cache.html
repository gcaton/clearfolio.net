<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Clearfolio — Clear Cache</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 480px; margin: 60px auto; padding: 0 1rem; color: #1e293b; }
    h1 { font-size: 1.25rem; }
    p { line-height: 1.6; color: #475569; }
    #status { margin-top: 1.5rem; padding: 1rem; border-radius: 0.5rem; background: #f1f5f9; }
    #status.done { background: #dcfce7; color: #166534; }
    #status.error { background: #fef2f2; color: #991b1b; }
    a { color: #2563eb; }
  </style>
</head>
<body>
  <h1>Clearing cache...</h1>
  <p>This page clears cached files so you get the latest version of Clearfolio.</p>
  <div id="status">Working...</div>
  <script>
    (async function() {
      const status = document.getElementById('status');
      try {
        const keys = await caches.keys();
        await Promise.all(keys.map(k => caches.delete(k)));

        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map(r => r.unregister()));
        }

        status.textContent = keys.length > 0
          ? 'Cache cleared (' + keys.length + ' store' + (keys.length !== 1 ? 's' : '') + ' removed). Redirecting...'
          : 'No caches found. Redirecting...';
        status.className = 'done';
        setTimeout(() => window.location.href = '/', 1500);
      } catch (e) {
        status.textContent = 'Could not clear cache automatically. Try clearing your browser data manually.';
        status.className = 'error';
      }
    })();
  </script>
</body>
</html>
